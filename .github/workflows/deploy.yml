name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: cp data/chips.json dist/chips.json
      - run: cp index.html dist/index.html
      - run: mkdir -p dist/demo
      - run: cp demo/*.html dist/demo/
      - run: cp -R demo/godoart-static dist/demo/godoart-static
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
